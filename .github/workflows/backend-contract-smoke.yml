name: Backend Contract Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API Contract Smoke Checks
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TEST_EMAIL: ${{ secrets.API_TEST_EMAIL }}
          API_TEST_PASSWORD: ${{ secrets.API_TEST_PASSWORD }}
        run: bash scripts/api_contract_smoke.sh
